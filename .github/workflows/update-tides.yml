name: Update tides

on:
  schedule:
    - cron: "15 19 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-tides
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run tides script
        env:
          WORLD_TIDES_API_KEY: ${{ secrets.WORLD_TIDES_API_KEY }}
        run: |
          mkdir -p docs
          python make_tides_json.py

      - name: Commit & push changes
        run: |
          git config user.name "tide-bot"
          git config user.email "tide-bot@users.noreply.github.com"
          git add docs/tides.json
          git commit -m "Update tides" || echo "No changes"
          git push
