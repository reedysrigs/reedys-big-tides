name: Update tides

on:
  schedule:
    - cron: "15 19 * * *"  # UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-tides
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug WorldTides key presence (non-fatal)
        shell: bash
        env:
          WORLD_TIDES_API_KEY: ${{ secrets.WORLD_TIDES_API_KEY }}
          WORLDTIDES_API_KEY: ${{ secrets.WORLD_TIDES_API_KEY }}
        run: |
          if [ -n "${WORLD_TIDES_API_KEY}" ] || [ -n "${WORLDTIDES_API_KEY}" ]; then
            echo "WorldTides key present ✅"
          else
            echo "WARNING: WorldTides key missing. PPB may be null, but WP should still update."
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Resolve Western Port CSV path
        shell: bash
        run: |
          set -euo pipefail
          echo "Finding WP CSV in ./data ..."
          CSV_CANDIDATE="$(ls -1 data/*westernport*csv 2>/dev/null | head -n 1 || true)"
          if [ -z "${CSV_CANDIDATE}" ]; then
            CSV_CANDIDATE="$(ls -1 data/*.csv 2>/dev/null | head -n 1 || true)"
          fi
          if [ -z "${CSV_CANDIDATE}" ]; then
            echo "ERROR: No CSV found in ./data"
            ls -la data || true
            exit 1
          fi
          echo "Using CSV: ${CSV_CANDIDATE}"
          echo "LOCAL_CSV_PATH=${CSV_CANDIDATE}" >> "${GITHUB_ENV}"

      - name: Generate tides.json (Top 10 big moves)
        shell: bash
        env:
          WORLD_TIDES_API_KEY: ${{ secrets.WORLD_TIDES_API_KEY }}
          WORLDTIDES_API_KEY: ${{ secrets.WORLD_TIDES_API_KEY }}
        run: |
          set -euo pipefail
          mkdir -p docs

          echo "LOCAL_CSV_PATH=${LOCAL_CSV_PATH}"
          python make_tides_json.py

          echo "---- preview docs/tides.json ----"
          python -c "import json; d=json.load(open('docs/tides.json')); print('generated_on:', d.get('generated_on')); print('top10:', len(d.get('top10', [])))"

      - name: Generate tide-next.json (Next high/low)
        shell: bash
        env:
          WORLD_TIDES_API_KEY: ${{ secrets.WORLD_TIDES_API_KEY }}
          WORLDTIDES_API_KEY: ${{ secrets.WORLD_TIDES_API_KEY }}
        run: |
          set -euo pipefail

          # Some scripts write to ./docs, others to ../docs — create both.
          mkdir -p docs
          mkdir -p ../docs

          if [ -f scripts/build_tide_next.py ]; then
            echo "Running: scripts/build_tide_next.py"
            python scripts/build_tide_next.py
          elif [ -f scripts/make_tide_next_json.py ]; then
            echo "Running: scripts/make_tide_next_json.py"
            python scripts/make_tide_next_json.py
          else
            echo "ERROR: No next-tide script found."
            echo "Expected one of:"
            echo "  - scripts/build_tide_next.py"
            echo "  - scripts/make_tide_next_json.py"
            ls -la scripts || true
            exit 1
          fi

          echo "---- locate generated tide-next.json ----"
          if [ -f docs/tide-next.json ]; then
            echo "Found: docs/tide-next.json"
            python -c "import json; d=json.load(open('docs/tide-next.json')); print('generated_on:', d.get('generated_on')); print('wp:', d.get('wp')); print('ppb:', d.get('ppb'))"
          elif [ -f ../docs/tide-next.json ]; then
            echo "Found: ../docs/tide-next.json"
            python -c "import json; d=json.load(open('../docs/tide-next.json')); print('generated_on:', d.get('generated_on')); print('wp:', d.get('wp')); print('ppb:', d.get('ppb'))"
            echo "Copying ../docs/tide-next.json -> docs/tide-next.json"
            cp ../docs/tide-next.json docs/tide-next.json
          else
            echo "ERROR: tide-next.json was not created in docs/ or ../docs/"
            echo "Tree (repo root):"
            ls -la
            echo "Tree (docs):"
            ls -la docs || true
            echo "Tree (../docs):"
            ls -la ../docs || true
            exit 1
          fi

      - name: Commit & push changes (only if changed)
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "tide-bot"
          git config user.email "tide-bot@users.noreply.github.com"

          git add docs/tides.json docs/tide-next.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update tides.json and tide-next.json"
          git push
